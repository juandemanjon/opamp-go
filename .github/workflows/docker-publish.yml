name: Build and Publish Docker Images

on:
  push:
    branches:
      - '**'  # Triggers on any branch push (temporary for testing)
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:  # Allows manual triggering from any branch

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write  # Required for pushing to GitHub Container Registry
  id-token: write  # Required for artifact attestation
  attestations: write  # Required for artifact attestation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.agent
            image-name: opamp-agent-example
            context: .
          - dockerfile: Dockerfile.server
            image-name: opamp-server-example
            context: .
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN_GITHUB }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image-name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image-name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Make package public
        continue-on-error: true  # Don't fail the workflow if this step fails
        run: |
          # Extract package name from image name
          PACKAGE_NAME="${{ matrix.image-name }}"
          OWNER="${{ github.repository_owner }}"
          
          # Wait a moment for the package to be fully registered
          sleep 5
          
          # Make the package public using GitHub API
          # First, try to update the package visibility
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PACKAGES_TOKEN_GITHUB }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE_NAME}" \
            -d '{"visibility":"public"}' || \
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PACKAGES_TOKEN_GITHUB }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE_NAME}" \
            -d '{"visibility":"public"}'
          
          echo "Attempted to make package ${PACKAGE_NAME} public"
